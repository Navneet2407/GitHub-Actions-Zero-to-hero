---
name: Portfolio
on:
  push:
    branches:
      - main
  workflow_dispatch:
 
permissions:
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup the github pages
        uses: actions/configure-pages@v4
      - name: upload static files
        uses: actions/upload-pages-artifacts@v4
      - name: Deploy to github pages
        uses: actions/deploy-pages@v4

