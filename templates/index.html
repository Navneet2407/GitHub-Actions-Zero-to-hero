<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Zero To Hero</title>
<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.container{text-align:center}
.badge{margin:10px;padding:6px 14px;border:1px solid #7b2ff7;border-radius:20px}
.cards{display:flex;gap:10px;justify-content:center;margin-top:20px}
.card{background:rgba(255,255,255,0.08);padding:15px;border-radius:10px}
</style>
</head>

<body>
<div class="container">
  <h1>DevOps Zero To Hero</h1>
  <div class="badge">Navneet's WEBPAGE</div>

  <div class="cards">
    <div class="card">Build ✔</div>
    <div class="card">Test ✔</div>
    <div class="card">Lint ✔</div>
    <div class="card">Deploy ✔ (GitHub Actions)</div>
  </div>
</div>
</body>
</html>
